services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: clauseiq
      POSTGRES_PASSWORD: clauseiq_dev
      POSTGRES_DB: clauseiq
    ports:
      - "5434:5432"     # was 5433, now clear of SentinelOps
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"     # was 6379, now clear of SentinelOps

volumes:
  pgdata:
  qdrant_data: