version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: clauseiq
      POSTGRES_PASSWORD: clauseiq_dev
      POSTGRES_DB: clauseiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
